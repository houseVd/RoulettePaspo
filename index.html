<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Roulette Paspò Ayisyen</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        .wheel-wrapper { position: relative; margin-top: 50px; }
        #wheel {
            width: 350px; height: 350px; border: 10px solid #f1c40f; border-radius: 50%;
            position: relative; overflow: hidden;
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: conic-gradient(
                #e74c3c 0deg 60deg, #3498db 60deg 120deg, #2ecc71 120deg 180deg, 
                #f1c40f 180deg 240deg, #9b59b6 240deg 300deg, #e67e22 300deg 360deg
            );
        }
        .slice { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center; }
        .slice span { transform: rotate(30deg); font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #fff; z-index: 10; }
        .paspò-icon { width: 50px; height: 35px; transform: rotate(30deg); }
        .modal { background: #34495e; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; border: 2px solid #f1c40f; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Roulette Paspò Ayisyen</h1>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="slice" style="transform: rotate(0deg)"><span>25HTG</span></div>
            <div class="slice" style="transform: rotate(60deg)"><span>15HTG</span></div>
            <div class="slice" style="transform: rotate(120deg)"><span>10HTG</span></div>
            <div class="slice" style="transform: rotate(180deg)"><span>50HTG</span></div>
            <div class="slice" style="transform: rotate(240deg)"><span>5HTG</span></div>
            <div class="slice" style="transform: rotate(300deg)"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9Va2N8J8n7x-hbynpzMO3KN1fokZJcwcAKg&s" class="paspò-icon"></div>
            </div>
    </div>

    <div class="modal" id="control-box">
        <button id="btn-pay" onclick="peye()">Peye 100 Goud pou vire</button>
        <button id="btn-spin" onclick="vireRoulette()" style="display:none; background: #27ae60;">VIRE WOU A</button>
    </div>

    <script>
        let counter = 0;
        let currentRotation = 0;

        function peye() {
            alert("Peman Resevwa! Ou ka vire kounye a.");
            document.getElementById('btn-pay').style.display = 'none';
            document.getElementById('btn-spin').style.display = 'block';
        }

        function vireRoulette() {
            counter++;
            document.getElementById('btn-spin').style.display = 'none';
            
            // Si se 500e fwa a, fòse l kanpe sou paspò (300 degre)
            let rotation = (counter === 500) ? currentRotation + 1800 + 300 : currentRotation + Math.floor(Math.random() * 360) + 1800;
            currentRotation = rotation;
            
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                if (counter === 500) {
                    alert("Felisitasyon! Ou genyen yon PASPÒ AYISYEN!");
                    counter = 0;
                } else {
                    alert("Ou genyen yon prim nan wou a!");
                }
                document.getElementById('btn-pay').style.display = 'block';
            }, 5500);
        }
    </script>
</body>
</html>
