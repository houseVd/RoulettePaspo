<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Roulette Paspò Ayisyen</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; }
        
        /* Desen Roulette a */
        #roulette-wheel {
            width: 300px; height: 300px; border: 10px solid #f1c40f; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: conic-gradient(#e74c3c 0deg 60deg, #3498db 60deg 120deg, #2ecc71 120deg 180deg, 
                         #e74c3c 180deg 240deg, #3498db 240deg 300deg, #2ecc71 300deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            position: relative;
        }

        .item { position: absolute; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px black; }

        .paspò-img { width: 40px; height: 30px; }

        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; margin-top: 20px; }
        #btn-pay { background: #27ae60; color: white; }
        #btn-spin { background: #f39c12; color: white; display: none; }
    </style>
</head>
<body>

    <h1>Roulette Paspò Ayisyen</h1>
    <div id="roulette-wheel">
        <div id="content" style="text-align:center;">Vire!</div>
    </div>

    <button id="btn-pay" onclick="peye()">Peye 100 Goud</button>
    <button id="btn-spin" onclick="vireRoulette()">VIRE ROULETTE LA</button>

    <div id="status" style="margin-top: 20px;">Esè: 0 / 500</div>

    <script>
        let counter = 0;
        let hasPaid = false;
        const wheel = document.getElementById('roulette-wheel');

        function peye() {
            hasPaid = true;
            document.getElementById('btn-pay').style.display = 'none';
            document.getElementById('btn-spin').style.display = 'block';
            alert("Peman konfime! Ou gen dwa vire.");
        }

        function vireRoulette() {
            if (!hasPaid) return;
            counter++;
            hasPaid = false;
            document.getElementById('btn-spin').style.display = 'none';
            document.getElementById('btn-pay').style.display = 'block';
            document.getElementById('status').innerText = `Esè: ${counter} / 500`;

            // Kalkile wotasyon (min 5 vire konplè + degre o aza)
            let rotation = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                if (counter >= 500) {
                    document.getElementById('content').innerHTML = '<img src="paspo_ayisyen.jpg" class="paspò-img"><br>PASPÒ!';
                    counter = 0; // Reset
                } else {
                    let prizes = ["25 HTG", "15 HTG", "10 HTG", "50 HTG", "5 HTG", "0 HTG"];
                    document.getElementById('content').innerText = prizes[Math.floor(Math.random() * prizes.length)];
                }
            }, 4000); // Tan an matche ak CSS transition
        }
    </script>
</body>
</html>
