<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Roulette Paspò Ayisyen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: #ffffff; }
        h1 { margin-top: 20px; color: #f1c40f; }
        .wheel-wrapper { position: relative; margin-top: 40px; }
        
        #wheel {
            width: 350px; height: 350px; border: 12px solid #333; border-radius: 50%;
            position: relative; overflow: hidden;
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: conic-gradient(
                #e74c3c 0deg 60deg, #3498db 60deg 120deg, #2ecc71 120deg 180deg, 
                #f1c40f 180deg 240deg, #9b59b6 240deg 300deg, #e67e22 300deg 360deg
            );
        }
        
        .slice { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center; }
        .slice span { transform: rotate(30deg); font-weight: bold; font-size: 16px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 50px solid #ffffff; z-index: 10; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        
        .modal { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; margin-top: 40px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: transform 0.2s, background 0.3s; }
        button:hover { transform: scale(1.05); }
        #btn-pay { background: #3498db; color: white; }
        #btn-spin { background: #27ae60; color: white; display: none; }
    </style>
</head>
<body>

    <h1>Roulette Paspò Ayisyen</h1>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="slice" style="transform: rotate(0deg)"><span>25 HTG</span></div>
            <div class="slice" style="transform: rotate(60deg)"><span>15 HTG</span></div>
            <div class="slice" style="transform: rotate(120deg)"><span>20 HTG</span></div>
            <div class="slice" style="transform: rotate(180deg)"><span>50 HTG</span></div>
            <div class="slice" style="transform: rotate(240deg)"><span>5 HTG</span></div>
            <div class="slice" style="transform: rotate(300deg)"><span style="font-size: 18px; color: #fff;">PASPÒ</span></div>
        </div>
    </div>

    <div class="modal">
        <button id="btn-pay" onclick="peye()">Peye 100 Goud pou vire</button>
        <button id="btn-spin" onclick="vireRoulette()">VIRE WOU A</button>
    </div>

    <script>
        let counter = 0;
        let currentRotation = 0;
        const prizes = ["25 HTG", "15 HTG", "20 HTG", "50 HTG", "5 HTG", "PASPÒ"];

        function peye() {
            if(confirm("Èske ou sèten ou vle peye 100 Goud pou yon esè?")) {
                document.getElementById('btn-pay').style.display = 'none';
                document.getElementById('btn-spin').style.display = 'inline-block';
            }
        }

        function vireRoulette() {
            counter++;
            document.getElementById('btn-spin').style.display = 'none';
            
            // Si 500e fwa, fòse kanpe sou PASPÒ (300 degre)
            let rotation = (counter === 500) ? currentRotation + 1800 + 300 : currentRotation + Math.floor(Math.random() * 360) + 1800;
            currentRotation = rotation;
            
            document.getElementById('wheel').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                if (counter === 500) {
                    alert("FELISITASYON! Ou genyen yon PASPÒ AYISYEN ofisyèl!");
                    counter = 0;
                } else {
                    // Kalkile ki prim ki nan 300 degre (apre wotasyon)
                    let finalDeg = (rotation % 360);
                    let index = Math.floor(finalDeg / 60);
                    alert("Domaj! Ou genyen: " + prizes[index]);
                }
                document.getElementById('btn-pay').style.display = 'inline-block';
            }, 5000);
        }
    </script>
</body>
</html>
