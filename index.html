<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Roulette Paspò Ayisyen</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; }
        .roulette-container { position: relative; width: 300px; height: 300px; border: 10px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: white; }
        .paspò-img { width: 80px; }
        #btn-pay { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; margin-top: 20px; }
        #btn-spin { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px; margin-top: 10px; display: none; }
        .status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Roulette Paspò Ayisyen</h1>
    <div class="roulette-container" id="roulette">
        <span id="resultat">Vire Roulette la!</span>
    </div>

    <button id="btn-pay" onclick="peye()">Peye 100 Goud pou jwe</button>
    <button id="btn-spin" onclick="vireRoulette()">VIRE ROULETTE LA</button>

    <div class="status" id="status">Esè: 0 / 500</div>

    <script>
        let counter = 0;
        let hasPaid = false;
        const options = ["25 HTG", "15 HTG", "10 HTG", "50 HTG", "5 HTG", "0 HTG"];

        function peye() {
            alert("Mèsi! Ou fin peye 100 Goud. Koulye a ou ka vire.");
            hasPaid = true;
            document.getElementById('btn-pay').style.display = 'none';
            document.getElementById('btn-spin').style.display = 'block';
        }

        function vireRoulette() {
            if (!hasPaid) return;
            
            counter++;
            document.getElementById('status').innerText = `Esè: ${counter} / 500`;

            // Lojik: si se 500e fwa a, li bay Paspò
            if (counter === 500) {
                document.getElementById('resultat').innerHTML = '<img src="paspo_ayisyen.jpg" class="paspò-img"><br>FELISITASYON! Ou jwenn yon PASPÒ!';
                counter = 0; // Reset apre ou fin genyen
            } else {
                let randomVal = options[Math.floor(Math.random() * options.length)];
                document.getElementById('resultat').innerText = randomVal;
            }
            
            hasPaid = false;
            document.getElementById('btn-pay').style.display = 'block';
            document.getElementById('btn-spin').style.display = 'none';
        }
    </script>
</body>
</html>
